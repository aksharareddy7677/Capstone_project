<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All-Users-For-Admin</title>
</head>
<body>
    <h1>All Users</h1>
    <a class="btn btn-secondary" th:href="@{/api/admin/dashboard}">Back to Home Page</a>
    <table class="table table-striped" border="1">
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <button>
                    <a >Edit</a>
                    <a >Delete</a>
                </button>
            </td>
        </tr>
    </table>
</body>
</html>
