<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" xmlns:th="http://www.thymeleaf.org">
    <title>Classroom-Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1>Classroom-Form</h1>
    <a th:href="@{/api/admin/dashboard}">⬅ Back to Dashboard</a>
    <form th:object="${classroom}" th:action="@{/api/admin/classroom}" method="post">

        <input type="hidden" th:field="*{id}" />

        <input type="text" th:field="*{name}" placeholder="Enter Class Name" />

        <input  type="text" th:field="*{section}" placeholder="Enter Class Section"/>

        <input type="number" th:field="*{year}" placeholder="Enter Class Year"/>

        <button type="submit">Add Classroom</button>
        <a class="btn btn-secondary" th:href="@{/api/admin/dashboard}">Cancel</a>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
