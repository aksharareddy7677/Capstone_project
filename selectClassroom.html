<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select Classroom</title>
</head>
<body>
<h1>Select Classroom</h1>
<a th:href="@{/api/teacher/dashboard}">⬅ Back to Dashboard</a>

<form th:action="@{/api/teacher/class}" method="get">
    <label>Classroom</label>
    <select name="classroomId" required>
        <option th:each="c : ${classrooms}"
                th:value="${c.id}"
                th:text="${c.name}">
        </option>
    </select>

    <label>Section</label>
    <select name="section" required>
        <option th:each="s : ${sections}"
                th:value="${s}"
                th:text="${s}">
        </option>
    </select>

    <button type="submit">View Class</button>
</form>
</body>
</html>
