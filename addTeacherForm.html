<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add-Teacher-Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <h1>Add Teacher</h1>
    <a th:href="@{/api/admin/dashboard}">⬅ Back to Dashboard</a>
    <form th:action="@{/api/admin/teacher}"
          th:object="${user}"
          method="post">

        <label>Teacher Name</label>
        <input type="text" th:field="*{name}"
               placeholder="Enter Teacher Name" required>

        <label>Teacher Email</label>
        <input type="email" th:field="*{email}"
               placeholder="Enter Teacher Email" required>

        <label>Teacher Password</label>
        <input type="password" th:field="*{password}"
               placeholder="Enter Teacher Password" required>

        <button type="submit">Add Teacher</button>
        <a class="btn btn-secondary" th:href="@{/api/admin/dashboard}">Cancel</a>
    </form>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
