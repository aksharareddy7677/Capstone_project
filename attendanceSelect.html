<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance-Select</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
  <h1>Attendance-Select</h1>
  <a th:href="@{/api/teacher/dashboard}">⬅ Back to Dashboard</a>
  <form th:action="@{/api/teacher/attendance}" method="get">
    <label>Classroom</label>
    <select name="classroomId" class="form-select" required>
      <option th:each="c:${classrooms}" th:value="${c.id}"
      th:text="${c.name}">

      </option>
    </select>
    <label>Section</label>
    <select name="section" class="form-select" required>
      <option th:each="s : ${sections}" th:value="${s}"
      th:text="${s}">
      </option>
    </select>
    <label>Subject</label>
    <select name="subjectId" class="form-select" required>
      <option th:each="sub:${subjects}" th:value="${sub.id}"
              th:text="${sub.name}">

      </option>
    </select>

    <button class="btn btn-primary mt-3">Load Students</button>
  </form>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
