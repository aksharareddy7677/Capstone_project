<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org`">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
</head>
<body>
    <h1>Registration Page</h1>
    <form th:object="${user}" th:action="@{/api/auth/register}" method="post">
        <input type="text" name="name" th:field="*{name}" placeholder="Enter your name"/>
        <input type="email" name="email" th:field="*{email}" placeholder="Enter your email"/>
        <input type="password" name="password" th:field="*{password}" placeholder="Enter your password"/>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account?
    <a th:href="@{/api/auth/login}">Login Here</a>
    </p>

</body>
</html>
